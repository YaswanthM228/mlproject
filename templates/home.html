
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    box-shadow:0px 15px 35px rgba(0,0,0,.3);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:500;
}

select,
input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.btn{
    width:100%;
    margin-top:20px;
    padding:16px;
    background:#38bdf8;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    background:#0284c7;
}

.result-card{
    margin-top:30px;
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.result-card h2{
    color:#2563eb;
    margin-bottom:15px;
}

.score{
    font-size:45px;
    font-weight:600;
    color:#16a34a;
}

.performance{
    margin-top:15px;
    font-size:20px;
}

.progress{
    margin-top:20px;
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:{{ results }}%;
    background:#22c55e;
}

@media(max-width:768px){

.row{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Student Exam Performance Predictor</h1>

<form action="/predictdata" method="POST">

<div class="row">

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="form-group">
<label>Race Ethnicity</label>
<select name="race_ethnicity">
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>
</div>

<div class="form-group">
<label>Parental Level of Education</label>
<select name="parental_level_of_education">
<option value="some high school">Some High School</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="master's degree">Master's Degree</option>
</select>
</div>

<div class="form-group">
<label>Lunch</label>
<select name="lunch">
<option value="standard">Standard</option>
<option value="free/reduced">Free / Reduced</option>
</select>
</div>

<div class="form-group">
<label>Test Preparation Course</label>
<select name="test_preparation_course">
<option value="none">None</option>
<option value="completed">Completed</option>
</select>
</div>

<div class="form-group">
<label>Reading Score</label>
<input type="number" name="reading_score" min="0" max="100" required>
</div>

<div class="form-group">
<label>Writing Score</label>
<input type="number" name="writing_score" min="0" max="100" required>
</div>

</div>

<button class="btn" type="submit">
Predict Math Score
</button>

</form>

{% if results %}

<div class="result-card">

<h2>Predicted Math Score</h2>

<div class="score">
{{ "%.2f"|format(results) }}
</div>

<div class="performance">

{% if results >= 80 %}
Excellent Performance
{% elif results >= 60 %}
Good Performance
{% elif results >= 40 %}
Average Performance
{% else %}
Needs Improvement
{% endif %}

</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

{% endif %}

</div>

</div>

</body>
</html>
