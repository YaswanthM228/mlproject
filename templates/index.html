
<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
}

.container{
    width:90%;
    max-width:900px;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:70px;
    text-align:center;
    color:white;
    box-shadow:0px 20px 40px rgba(0,0,0,.3);
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

p{
    font-size:18px;
    color:#e2e8f0;
    line-height:1.8;
    margin-bottom:40px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#38bdf8;
    color:white;
    padding:18px 40px;
    border-radius:12px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
    transform:translateY(-4px);
}

.feature-box{
    margin-top:50px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.feature{
    background:rgba(255,255,255,.08);
    padding:20px;
    width:180px;
    border-radius:15px;
}

.feature h3{
    margin-bottom:10px;
}

.feature p{
    font-size:14px;
    margin-bottom:0;
}

</style>

<body>

<div class="container">

<div class="card">

Predict student math scores using Machine Learning and data-driven insights.
</p>

<a href="/predictdata" class="btn">
Get Started
</a>

<div class="feature-box">

<div class="feature">
<h3>Machine Learning</h3>
<p>Regression model based prediction.</p>
</div>

<div class="feature">
<h3>Fast Results</h3>
<p>Instant prediction with trained model.</p>
</div>

<div class="feature">
<h3>Interactive</h3>

</div>

</div>

</div>

</div>
